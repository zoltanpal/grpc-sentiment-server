name: Deploy gRPC Sentiment Server

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -eu

            BRANCH_NAME="${{ github.ref_name }}"
            WORK_DIR="${{ secrets.SERVER_DEPLOYMENT_PATH }}"

            echo ">>> Deploying gRPC Sentiment Server"
            echo ">>> Branch: $BRANCH_NAME"
            echo ">>> Work dir: $WORK_DIR"

            if [ -z "$BRANCH_NAME" ]; then
              echo "ERROR: BRANCH_NAME is empty"
              exit 1
            fi

            if [ -z "$WORK_DIR" ]; then
              echo "ERROR: WORK_DIR is empty"
              exit 1
            fi

            if [ ! -d "$WORK_DIR" ]; then
              echo "ERROR: Deployment directory does not exist: $WORK_DIR"
              exit 1
            fi

            cd "$WORK_DIR"

            export PYENV_ROOT="$HOME/.pyenv"
            export PATH="$PYENV_ROOT/bin:$PATH"

            if command -v pyenv >/dev/null 2>&1; then
              eval "$(pyenv init -)"
            else
              echo "ERROR: pyenv not found in PATH"
              exit 1
            fi

            echo ">>> pyenv version: $(pyenv version)"
            echo ">>> python version: $(python --version)"

            echo ">>> Fetching latest code..."
            git fetch --prune origin

            if ! git show-ref --verify --quiet "refs/remotes/origin/$BRANCH_NAME"; then
              echo "ERROR: Remote branch origin/$BRANCH_NAME does not exist"
              exit 1
            fi

            echo ">>> Checking out branch..."
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"

            echo ">>> Resetting working tree..."
            git reset --hard "origin/$BRANCH_NAME"

            echo ">>> Cleaning untracked files..."
            git clean -fd -e .env -e .venv

            if [ ! -d ".venv" ]; then
              echo ">>> Creating virtual environment..."
              python -m venv .venv
            fi

            echo ">>> Activating virtual environment..."
            . .venv/bin/activate

            echo ">>> Installing dependencies..."
            pip install .

            if [ -f download_language_models.sh ]; then
              echo ">>> Downloading language models..."
              bash download_language_models.sh "$WORK_DIR"
            fi

            echo ">>> Fixing permissions..."
            chmod -R u+rwX "$WORK_DIR"

            # echo ">>> Restarting gRPC sentiment service..."
            # sudo systemctl daemon-reload
            # sudo systemctl restart your-grpc-service-name.service
            # sudo systemctl status your-grpc-service-name.service --no-pager

            echo ">>> Deployment finished successfully."
