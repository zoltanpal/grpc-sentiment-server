name: Deploy gRPC Sentiment Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Select environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            ENV=${{ github.event.inputs.environment }}
            WORK_DIR=${{ secrets.SERVER_DEPLOYMENT_PATH }}

            echo ">>> Deploying gRPC Sentiment Server to $WORK_DIR ($ENV)"

            # Ensure work dir exists
            cd $WORK_DIR
            
            export PYENV_ROOT="$HOME/.pyenv"
            export PATH="$PYENV_ROOT/bin:$PATH"

            if command -v pyenv >/dev/null 2>&1; then
              eval "$(pyenv init -)"
            else
              echo "pyenv not found in PATH"
              exit 1
            fi

            echo "pyenv version: $(pyenv version)"
            echo "python version: $(python --version)"

            echo "Fetching latest code..."
            git fetch --prune origin

            echo "Checking out branch..."
            git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"

            echo "Resetting working tree..."
            git reset --hard "origin/$BRANCH_NAME"

            echo "Cleaning untracked files..."
            git clean -fd -e .env -e .venv

            if [ ! -d ".venv" ]; then
              echo "Creating virtual environment..."
              python -m venv .venv
            fi

            echo "Activating virtual environment..."
            source .venv/bin/activate

            # pip install --upgrade pip setuptools wheel

            pip install -r requirements.txt

            # Download language models (if script exists)
            if [ -f download_language_models.sh ]; then
              bash download_language_models.sh $WORK_DIR
            fi

            chmod -R u+rwX "$WORK_DIR"

            # echo ">>> Restarting gRPC sentiment service"
            # sudo systemctl daemon-reload

            echo "Deployment finished successfully."
